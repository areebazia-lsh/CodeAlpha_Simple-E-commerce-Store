<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login — Arexon</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="auth-shell">
    <div class="auth-visual" style="background: linear-gradient(-45deg, #150A1F, #1E1240, #0F0A24, #1B1240); background-size:400% 400%;">
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
        <a href="index.html" class="brand">are<span class="gradient-text">xon</span> <span class="badge-admin">Admin</span></a>
        <div class="auth-visual-content">
            <h2>Run the store from one dashboard.</h2>
            <p>Manage products, inventory, and every customer order in real time.</p>
        </div>
        <div class="auth-visual-footer">&copy; 2026 Arexon</div>
    </div>

    <div class="auth-form-side">
        <div class="auth-page">
            <h1>Administrator Login</h1>
            <p class="auth-subtitle">Manage products and orders</p>
            <div id="form-alert"></div>
            <form id="admin-login-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="password-field">
                        <input type="password" id="password" required autocomplete="current-password">
                        <button type="button" class="password-toggle" data-target="password"></button>
                    </div>
                </div>
                <button type="submit" class="btn btn-accent btn-block" id="submit-btn">Log In</button>
            </form>
            <p class="auth-switch">Need an admin account? <a href="admin-register.html">Sign up</a></p>
            <p class="auth-cross-link"><a href="login.html">Log in as a customer instead →</a></p>
        </div>
    </div>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
